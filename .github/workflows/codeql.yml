name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: java-kotlin

    # This replaces the 'autobuild' step
    - name: Build GMS Variant
      run: |
        chmod +x gradlew
        ./gradlew assembleGmsDebug -Dandroid.suppressUnsupportedCompileSdk=36

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
