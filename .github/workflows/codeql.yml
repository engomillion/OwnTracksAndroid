name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '42 3 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: java-kotlin
          build-mode: manual

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Build GMS Variant
      if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        cd project
        chmod +x gradlew
        
        echo "Forcing compilers to run in the foreground..."
        
        # 1. We use 'compileGmsDebugJavaWithJavac' and 'compileGmsDebugKotlin' 
        #    to target the compilers directly.
        # 2. We set multiple flags to keep everything in one process.
        ./gradlew clean compileGmsDebugJavaWithJavac compileGmsDebugKotlin \
          --no-daemon \
          --no-build-cache \
          -Dorg.gradle.parallel=false \
          -Dorg.gradle.vfs.watch=false \
          -Dkotlin.compiler.execution.strategy="in-process" \
          -Dandroid.suppressUnsupportedCompileSdk=36
        
        echo "GMS Build complete."

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
