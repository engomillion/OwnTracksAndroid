name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '42 3 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: java-kotlin
          build-mode: manual

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Build GMS Variant
      if: matrix.build-mode == 'manual'
      # This is the key: tell the whole step to run inside 'project'
      working-directory: ./project 
      shell: bash
      run: |
        echo "Starting manual build for Google Play (GMS) variant..."
        chmod +x gradlew
        
        # 'clean' forces a recompile so the CodeQL tracer can 'see' the files
        # '--no-daemon' ensures the build happens in this process, not a background one
        ./gradlew clean assembleGmsDebug --no-daemon -Dandroid.suppressUnsupportedCompileSdk=36
        
        echo "GMS Build complete."

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
